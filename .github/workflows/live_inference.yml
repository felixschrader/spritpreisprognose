# .github/workflows/live_inference.yml
#
# Läuft stündlich und erstellt eine aktuelle Dieselpreis-Prognose
# für die ARAL Dürener Str. 407 (Köln).
# Ergebnis wird als JSON ins Repo committed und ist für das Dashboard verfügbar.

name: Live Inference — Dieselpreisprognose

on:
  schedule:
    # Stündlich — nur Commit wenn Preis sich geändert hat
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TANKERKOENIG_KEY=${{ secrets.TANKERKOENIG_KEY }}" >> .env

      - name: Run live inference
        run: python live_inference.py

      - name: Prognose auslesen
        run: |
          echo "PREIS=$(jq -r '.preis_aktuell' data/ml/prognose_aktuell.json)" >> $GITHUB_ENV
          echo "RICHTUNG_6H=$(jq -r '.richtung_6h' data/ml/prognose_aktuell.json)" >> $GITHUB_ENV
          echo "RICHTUNG_12H=$(jq -r '.richtung_12h' data/ml/prognose_aktuell.json)" >> $GITHUB_ENV
          echo "EMPFEHLUNG=$(jq -r '.empfehlung' data/ml/prognose_aktuell.json)" >> $GITHUB_ENV
          echo "DIP_PEAK=$(jq -r '.dip_oder_peak' data/ml/prognose_aktuell.json)" >> $GITHUB_ENV

      - name: Commit and push to main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/ml/prognose_aktuell.json data/ml/preis_live_log.csv
          git status --porcelain | grep -q . \
            && git commit -m "ml: Prognose update $(TZ='Europe/Berlin' date +'%Y-%m-%d %H:%M')" \
            && git push origin main \
            || echo "Keine Änderungen — kein Commit nötig"

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "Dieselpreis-Prognose ARAL Dürener Str. 407"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status == 'success' && '✅ Erfolgreich' || '❌ Fehlgeschlagen' }}
            *Preis:* ${{ env.PREIS }} €
            *Dip/Peak:* ${{ env.DIP_PEAK }}
            *Prognose 6h:* ${{ env.RICHTUNG_6H }}
            *Prognose 12h:* ${{ env.RICHTUNG_12H }}
            *Empfehlung:* ${{ env.EMPFEHLUNG }}
          SLACK_FOOTER: "GitHub Actions | Diesel-Prognose-Bot"
