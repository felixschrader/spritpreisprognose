# .github/workflows/live_inference_tagesbasis.yml
#
# Läuft täglich nach dem Tankstellen-Update und erstellt eine
# tagesbasierte Dieselpreis-Prognose für die ARAL Dürener Str. 407.
# Zielvariable: delta_roll3_t1 — gleitendes 3-Tage-Delta des Kernpreises.
# Ergebnis wird als JSON ins Repo committed und ist für das Dashboard verfügbar.

name: Live Inference — Tagesprognose Diesel

on:
  schedule:
    # Täglich um 10:00 Uhr Berliner Zeit (nach Tankstellen-Update um 05:00)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inference:
    runs-on: ubuntu-latest

    steps:
      # Schritt 1: Repository auschecken
      - uses: actions/checkout@v4
        with:
          ref: main

      # Schritt 2: Python-Version festlegen
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Schritt 3: pip-Cache wiederverwenden
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # Schritt 4: Abhängigkeiten installieren
      - run: pip install -r requirements.txt

      # Schritt 5: .env Datei erstellen
      - name: Create .env file
        run: |
          echo "TANKERKOENIG_KEY=${{ secrets.TANKERKOENIG_KEY }}" >> .env

      # Schritt 6: Tages-Inference ausführen
      # Liest Modell + Metadaten, berechnet Feature-Vektor,
      # schreibt prognose_tagesbasis.json
      - name: Run Tages-Inference
        run: python live_inference_tagesbasis.py

      # Schritt 7: Prognose-Werte auslesen für Slack
      - name: Prognose auslesen
        run: |
          echo "KERNPREIS=$(jq -r '.kernpreis_aktuell' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV
          echo "DELTA=$(jq -r '.predicted_delta' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV
          echo "RICHTUNG=$(jq -r '.richtung' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV
          echo "EMPFEHLUNG=$(jq -r '.empfehlung' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV
          echo "DIP_PEAK=$(jq -r '.begruendung' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV
          echo "BRENT=$(jq -r '.brent_eur' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV
          echo "BRENT_TREND=$(jq -r '.brent_delta2' data/ml/prognose_tagesbasis.json)" >> $GITHUB_ENV

      # Schritt 8: Ergebnisse committen und pushen
      - name: Commit and push to main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/ml/prognose_tagesbasis.json
          git status --porcelain | grep -q . \
            && git commit -m "ml: Tagesprognose update $(TZ='Europe/Berlin' date +'%Y-%m-%d %H:%M')" \
            && git push origin main \
            || echo "Keine Änderungen — kein Commit nötig"

      # Schritt 9: Slack-Benachrichtigung
      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "Tagesprognose ARAL Dürener Str. 407"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status == 'success' && '✅ Erfolgreich' || '❌ Fehlgeschlagen' }}
            *Kernpreis:* ${{ env.KERNPREIS }} €
            *3-Tage Delta:* ${{ env.DELTA }} €
            *Richtung:* ${{ env.RICHTUNG }}
            *Dip/Peak:* ${{ env.DIP_PEAK }}
            *Empfehlung:* ${{ env.EMPFEHLUNG }}
            *Brent:* ${{ env.BRENT }} $ · ${{ env.BRENT_TREND }}
          SLACK_FOOTER: "GitHub Actions | Tagesprognose-Bot"
