# .github/workflows/update_brent_prices.yml
name: Brent Preise aktualisieren
on:
  schedule:
    #- cron: '0 7,19 * * *'  # 8:00 und 20:00 MEZ
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}" > .env
          echo "SLACK_WEBHOOK=${{ secrets.SLACK_WEBHOOK }}" >> .env

      - name: Run analysis
        id: analysis
        run: python brent_price.py

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/ plots/ || true
          git status --porcelain | grep -q . && git commit -m "Update $(TZ='Europe/Berlin' date +'%Y-%m-%d %H:%M')" && git push || echo "Keine Änderungen"

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "Brent Preis-Update"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status == 'success' && '✅ Erfolgreich' || '❌ Fehlgeschlagen' }}
            *Zeit:* ${{ steps.analysis.outputs.updated }}
            *Preis:* ${{ steps.analysis.outputs.last_price }} USD
            *Trend:* ${{ steps.analysis.outputs.trend_30d }}
          SLACK_FOOTER: "GitHub Actions | Brent-Preis-Bot"