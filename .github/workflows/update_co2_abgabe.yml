# .github/workflows/update_co2_abgabe.yml
#
# Aktualisiert die tägliche CO2-Abgabe-Zeitreihe (data/co2_abgabe.csv).
#
# 2014–2025: Statische Festpreise nach BEHG §10 Abs.2 — keine API nötig.
# 2026:      Gesetzlicher Planwert 60€/t (DEHSt, CO2KostAufG §4).
#            Ab Juli 2026 werden wöchentliche Auktionsergebnisse von der
#            DEHSt-Website geparst und überschreiben den Planwert.
# 2027+:     Wird ergänzt wenn EU-ETS 2 Preise verfügbar sind.
#
# Läuft wöchentlich dienstags — einen Tag nach den Montagsauktionen der EEX,
# damit neue Auktionsergebnisse sicher auf der DEHSt-Seite veröffentlicht sind.

name: CO2-Abgabe aktualisieren

on:
  schedule:
    # Dienstags 6:00 Uhr UTC — einen Tag nach den EEX-Montagsauktionen
    - cron: '0 6 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      # Generiert Festpreiszeitreihe 2014–2026 und scrapt ab Juli 2026
      # wöchentliche Auktionsergebnisse von der DEHSt-Website
      - name: Run CO2-Abgabe update
        id: co2
        run: python co2_abgabe.py

      - name: Commit and push to main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/co2_abgabe.csv
          git status --porcelain | grep -q . \
            && git commit -m "data: CO2-Abgabe update $(TZ='Europe/Berlin' date +'%Y-%m-%d %H:%M')" \
            && git push origin main \
            || echo "Keine Änderungen — kein Commit nötig"

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "CO2-Abgabe Update"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status == 'success' && '✅ Erfolgreich' || '❌ Fehlgeschlagen' }}
            *CO2-Preis:* ${{ steps.co2.outputs.last_preis }} €/t
            *Benzin-Aufschlag:* ${{ steps.co2.outputs.last_ct }} ct/L (brutto)
            *Zeilen:* ${{ steps.co2.outputs.rows }}
          SLACK_FOOTER: "GitHub Actions | CO2-Bot"