# .github/workflows/update_eur_usd.yml
name: EUR/USD Kurs aktualisieren
on:
  schedule:
    #- cron: '0 8,20 * * *'  # 9:00 und 21:00 MEZ
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt

      - name: Run analysis
        id: analysis
        run: python eur_usd_rate.py

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add features/ plots/ || true
          git diff --quiet || (git commit -m "Update $(date +'%Y-%m-%d %H:%M')" && git push)

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "EUR/USD Kurs-Update"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status == 'success' && '✅ Erfolgreich' || '❌ Fehlgeschlagen' }}
            *Zeit:* ${{ steps.analysis.outputs.updated }}
            *Kurs:* ${{ steps.analysis.outputs.last_rate }} EUR/USD
            *Trend:* ${{ steps.analysis.outputs.trend }}
          SLACK_FOOTER: "GitHub Actions | EUR/USD-Bot"