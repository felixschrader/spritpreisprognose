# .github/workflows/update_tankstellen.yml
name: Tankstellenpreise aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TANKERKOENIG_USER=${{ secrets.TANKERKOENIG_USER }}" >> .env
          echo "TANKERKOENIG_KEY=${{ secrets.TANKERKOENIG_KEY }}" >> .env
          echo "SLACK_WEBHOOK=${{ secrets.SLACK_WEBHOOK }}" >> .env

      - name: Clone Tankerkönig (sparse — nur heute + gestern)
        run: |
          TODAY_Y=$(date +%Y)
          TODAY_M=$(date +%m)
          YEST_Y=$(date -d "yesterday" +%Y)
          YEST_M=$(date -d "yesterday" +%m)
          REPO_URL="https://${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}@data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data.git"
          git clone --depth 1 --filter=blob:none --sparse "$REPO_URL" /tmp/tankerkoenig-data
          cd /tmp/tankerkoenig-data
          git sparse-checkout set \
            stations \
            "prices/${TODAY_Y}/${TODAY_M}" \
            "prices/${YEST_Y}/${YEST_M}"
        env:
          TANKERKOENIG_USER: ${{ secrets.TANKERKOENIG_USER }}
          TANKERKOENIG_KEY: ${{ secrets.TANKERKOENIG_KEY }}

      - name: Run pipeline update
        id: pipeline
        env:
          TANKERKOENIG_DATA_ROOT: /tmp/tankerkoenig-data
        run: python tankerkoenig_pipeline.py --update --no-pull