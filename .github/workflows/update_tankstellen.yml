# .github/workflows/update_tankstellen.yml
#
# Aktualisiert das Kölner Tankstellen-Parquet mit den neuesten Preisdaten.
#
# Strategie:
#   - Sparse Checkout: holt nur prices/YYYY/MM/ (aktueller + Vormonat) + stations/
#   - Liest UUIDs aus bestehendem Parquet im Repo
#   - Hängt nur neue Daten an
#   - Pusht auf main
#
# Secrets: TANKERKOENIG_USER, TANKERKOENIG_KEY, SLACK_WEBHOOK

name: Tankstellenpreise aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TANKERKOENIG_USER=${{ secrets.TANKERKOENIG_USER }}" >> .env
          echo "TANKERKOENIG_KEY=${{ secrets.TANKERKOENIG_KEY }}" >> .env
          echo "SLACK_WEBHOOK=${{ secrets.SLACK_WEBHOOK }}" >> .env

      - name: Clone Tankerkönig (sparse — nur aktueller + Vormonat)
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          PREV_YEAR=$(date -d "$(date +%Y-%m-01) -1 month" +%Y)
          PREV_MONTH=$(date -d "$(date +%Y-%m-01) -1 month" +%m)
          git clone \
            --depth 1 \
            --filter=blob:none \
            --no-checkout \
            --sparse \
            https://${{ secrets.TANKERKOENIG_USER }}:${{ secrets.TANKERKOENIG_KEY }}@data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data.git \
            /tmp/tankerkoenig
          cd /tmp/tankerkoenig
          git sparse-checkout set \
            stations \
            prices/${YEAR}/${MONTH} \
            prices/${PREV_YEAR}/${PREV_MONTH}
          git checkout