# .github/workflows/update_tankstellen.yml
name: Tankstellenpreise aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Download Tankerkönig CSVs (heute + gestern)
        run: |
          for DATE in $(date +%Y-%m-%d) $(date -d "yesterday" +%Y-%m-%d); do
            YEAR=$(echo $DATE | cut -d- -f1)
            MONTH=$(echo $DATE | cut -d- -f2)
            mkdir -p /tmp/tankerkoenig-data/prices/${YEAR}/${MONTH}
            curl -u "${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}" -fsSL \
              "https://data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/raw/master/prices/${YEAR}/${MONTH}/${DATE}-prices.csv" \
              -o "/tmp/tankerkoenig-data/prices/${YEAR}/${MONTH}/${DATE}-prices.csv" \
              && echo "✅ ${DATE}" || echo "❌ ${DATE} fehlgeschlagen"
          done
          mkdir -p /tmp/tankerkoenig-data/stations
          curl -u "${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}" -fsSL \
            "https://data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/raw/master/stations/stations.csv" \
            -o "/tmp/tankerkoenig-data/stations/stations.csv" \
            && echo "✅ stations.csv" || echo "❌ stations.csv fehlgeschlagen"
        env:
          TANKERKOENIG_USER: ${{ secrets.TANKERKOENIG_USER }}
          TANKERKOENIG_KEY: ${{ secrets.TANKERKOENIG_KEY }}