# .github/workflows/update_tankstellen.yml
name: Tankstellenpreise aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Debug Tankerkönig URL
        run: |
          echo "=== Test 1: Mit verbose ==="
          curl -v \
            "https://${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}@data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/raw/master/stations/stations.csv" \
            2>&1 | head -60
        env:
          TANKERKOENIG_USER: ${{ secrets.TANKERKOENIG_USER }}
          TANKERKOENIG_KEY: ${{ secrets.TANKERKOENIG_KEY }}