# .github/workflows/update_tankstellen.yml
name: Tankstellenpreise aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Test Tankerkönig Pfadstruktur
        run: |
          # Verzeichnisstruktur abrufen ohne Dateien herunterzuladen
          curl -u "${TANKERKOENIG_USER}:${TANKERKOENIG_KEY}" -fsSL \
            "https://data.tankerkoenig.de/tankerkoenig-organization/tankerkoenig-data/-/tree/master/prices/2026/03?format=json" \
            | head -c 2000
        env:
          TANKERKOENIG_USER: ${{ secrets.TANKERKOENIG_USER }}
          TANKERKOENIG_KEY: ${{ secrets.TANKERKOENIG_KEY }}